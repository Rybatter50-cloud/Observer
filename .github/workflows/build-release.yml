# =============================================================================
# RYBAT Intelligence Platform - GitHub Actions Build Workflow
# Version: 1.0.0
# Last Updated: 2026-02-02
# Authors: Mr Cat + Claude AI
# =============================================================================
#
# This workflow automatically builds RYBAT executables for all platforms
# when a new release is created on GitHub.
#
# TRIGGERS:
#   - New release created
#   - Manual dispatch (workflow_dispatch)
#
# OUTPUTS:
#   - RYBAT-{version}-windows-x64.zip
#   - RYBAT-{version}-macos-x64.tar.gz
#   - RYBAT-{version}-macos-arm64.tar.gz
#   - RYBAT-{version}-linux-x64.tar.gz
#
# =============================================================================

name: Build Release Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # BUILD MATRIX
  # ===========================================================================
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: tar.gz
          
          - os: windows-latest
            platform: windows
            arch: x64
            artifact: zip
          
          - os: macos-latest
            platform: macos
            arch: x64
            artifact: tar.gz
          
          - os: macos-14  # Apple Silicon runner
            platform: macos
            arch: arm64
            artifact: tar.gz
    
    steps:
      # -----------------------------------------------------------------------
      # CHECKOUT
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
      
      # -----------------------------------------------------------------------
      # PYTHON SETUP
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      # -----------------------------------------------------------------------
      # DEPENDENCIES
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      # -----------------------------------------------------------------------
      # BUILD
      # -----------------------------------------------------------------------
      - name: Build executable
        run: python build.py --all
      
      # -----------------------------------------------------------------------
      # GET VERSION
      # -----------------------------------------------------------------------
      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      # -----------------------------------------------------------------------
      # RENAME ARTIFACT
      # -----------------------------------------------------------------------
      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          
          if [ "${{ matrix.artifact }}" == "zip" ]; then
            mv dist/RYBAT-*.zip dist/RYBAT-${VERSION}-${PLATFORM}-${ARCH}.zip || true
          else
            mv dist/RYBAT-*.tar.gz dist/RYBAT-${VERSION}-${PLATFORM}-${ARCH}.tar.gz || true
          fi
          
          ls -la dist/
      
      # -----------------------------------------------------------------------
      # UPLOAD ARTIFACT
      # -----------------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RYBAT-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/RYBAT-*.${{ matrix.artifact }}
          retention-days: 30

  # ===========================================================================
  # RELEASE UPLOAD
  # ===========================================================================
  upload-release:
    name: Upload to Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      # -----------------------------------------------------------------------
      # DOWNLOAD ALL ARTIFACTS
      # -----------------------------------------------------------------------
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "RYBAT-*"
      
      # -----------------------------------------------------------------------
      # UPLOAD TO GITHUB RELEASE
      # -----------------------------------------------------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/RYBAT-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # CHECKSUMS
  # ===========================================================================
  create-checksums:
    name: Create Checksums
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum RYBAT-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      
      - name: Upload checksums to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
