# =============================================================================
# RYBAT Intelligence Platform — Nginx Reverse Proxy
# =============================================================================
#
# INSTALLATION:
#   1. Copy to sites-available:
#      sudo cp deploy/nginx-rybat.conf /etc/nginx/sites-available/rybat
#
#   2. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/rybat /etc/nginx/sites-enabled/
#
#   3. Remove the default site (optional):
#      sudo rm /etc/nginx/sites-enabled/default
#
#   4. Obtain TLS certificate (Let's Encrypt):
#      sudo apt install certbot python3-certbot-nginx
#      sudo certbot --nginx -d your-domain.example.com
#
#   5. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
#
# NOTES:
#   - Replace YOUR_DOMAIN with your actual domain or IP
#   - For IP-only access (no domain), use a self-signed cert:
#       sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#         -keyout /etc/ssl/private/rybat-selfsigned.key \
#         -out /etc/ssl/certs/rybat-selfsigned.crt
#     Then update ssl_certificate / ssl_certificate_key paths below.
#
# =============================================================================

# Rate limiting zones (shared memory)
# 10m = ~160K unique IPs tracked
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m   rate=5r/s;
limit_req_zone $binary_remote_addr zone=ws_connect:10m  rate=2r/s;

# --- Redirect HTTP → HTTPS ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server -------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # =========================================================================
    # TLS Configuration
    # =========================================================================
    # Let's Encrypt paths (certbot auto-fills these):
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Self-signed alternative (uncomment and use instead of Let's Encrypt):
    # ssl_certificate     /etc/ssl/certs/rybat-selfsigned.crt;
    # ssl_certificate_key /etc/ssl/private/rybat-selfsigned.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (Let's Encrypt)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # =========================================================================
    # Security Headers (supplement FastAPI's own headers)
    # =========================================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # =========================================================================
    # Request Size Limits
    # =========================================================================
    client_max_body_size 2m;

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/rybat_access.log;
    error_log  /var/log/nginx/rybat_error.log warn;

    # =========================================================================
    # WebSocket upgrade — /ws
    # =========================================================================
    location /ws {
        limit_req zone=ws_connect burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (long-lived connections)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # API — write endpoints (PATCH, POST, DELETE)
    # =========================================================================
    location ~ ^/api/v1/(intelligence/[^/]+|feeds|admin|chat) {
        limit_req zone=api_write burst=10 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # API — read endpoints (all other /api/)
    # =========================================================================
    location /api/ {
        limit_req zone=api_general burst=60 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # Static files — serve directly from nginx (faster)
    # =========================================================================
    location /static/ {
        alias /opt/rybat/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =========================================================================
    # All other requests — proxy to FastAPI (HTML pages, etc.)
    # =========================================================================
    location / {
        limit_req zone=api_general burst=30 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
